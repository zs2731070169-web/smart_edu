worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;

    keepalive_timeout  65;

    # 定义负载均衡集群
    upstream backend {
        server 127.0.0.1:8000; # 后端目标服务器地址
    }

    # HTTP(80端口)跳转HTTPS(443)
    server {
        listen 80;
        server_name www.ysccs.tech;
        # 301永久重定向，保留原请求路径
        return 301 https://$server_name$request_uri;
    }

    # /smart/edu AI智教服务
    server {
#         listen 443 ssl http2; # 启用http2，提升流式响应性能(nginx需要支持--with-http_v2_module 模块)
        listen 443 ssl;
        server_name www.ysccs.tech;

        # SSL 证书
        ssl_certificate /usr/local/nginx/conf/cert/www.ysccs.tech.pem;
        ssl_certificate_key /usr/local/nginx/conf/cert/www.ysccs.tech.key;

        # 流式响应关闭缓冲（SSE / StreamingResponse 必须）
        proxy_buffering off;
        proxy_cache off;

        # 反向代理配置
        location /smart/edu/ {
            proxy_pass http://backend; # 代理到负载均衡集群
            proxy_http_version 1.1; # 启用HTTP/1.1（流式响应必需）

            proxy_set_header Connection ""; # 清空Connection头，避免长连接中断
            proxy_set_header Host $host; # 传递域名
            proxy_set_header X-Real-IP $remote_addr; # 传递客户端真实IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链IP
            proxy_set_header X-Forwarded-Proto $scheme; # 传递协议（HTTPS）

            # 流式响应超时配置（RAG 回答可能较慢）
            proxy_read_timeout 120s; # 读取响应超时，Nginx 发送完请求 → 等待后端返回响应的阶段
            proxy_send_timeout 120s; # 发送请求超时，TCP 连接已建立 → Nginx 向后端发送请求数据的阶段
            proxy_connect_timeout 60s; # 连接后端超时，Nginx → 发起 TCP 连接 → 后端服务器
        }
    }
}