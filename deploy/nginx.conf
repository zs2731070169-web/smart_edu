worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip 压缩（对静态文件和动态资源响应均生效），Nginx 会把要传输给浏览器的文本类文件先压缩，大幅减少传输的数据量
    gzip            on; # 开启 Gzip 压缩
    gzip_vary       on; # 告诉浏览器 / CDN：响应内容是否压缩过
    gzip_min_length 1024; # 只压缩大于 1KB 的文件
    # 指定要压缩的文件类型
    gzip_types      text/plain text/css
                    application/javascript text/javascript
                    application/json application/xml;

    # 通过uri -> 缓存规则的map映射，定义静态资源缓存规则
    map $uri $static_cache_control {
        # 第一条规则, 路径是以 js、css、png、jpg 这些后缀结尾的，不管大写小写，都给它分配 “缓存 1 天” 的规则, public: 浏览器、CDN 都可以缓存这个文件, max-age=86400：浏览器把这个文件存在本地 1 天
        ~*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$  "public, max-age=86400";
        # 第二条规则，请求的路径不是上面那些后缀（比如 .html、/chat 接口），每次用之前必须问服务器
        default                                          "no-cache";
    }

    # 定义负载均衡集群（后端 FastAPI 两节点）
    upstream backend {
        # ip_hash：同一客户端 IP 始终路由到同一节点
        # 原因：Agent 对话历史用 InMemorySaver 存在各自进程内存里，
        # 若同一用户的请求轮询到不同节点，上下文会断掉，必须保证会话保持。
        ip_hash;
        server 127.0.0.1:8000;  # 节点 1
        server 127.0.0.1:8001;  # 节点 2
    }

    # HTTP(80端口) → HTTPS(443) 永久重定向
    server {
        listen 80;
        server_name www.ysccs.tech;
        return 301 https://$server_name$request_uri;
    }

    # /smart/edu AI智教服务
    server {
#       listen 443 ssl http2; # 启用 HTTP/2，提升多路复用性能（需要 --with-http_v2_module）
        listen 443 ssl;
        server_name www.ysccs.tech;

        # SSL 证书
        ssl_certificate     /usr/local/nginx/conf/cert/www.ysccs.tech.pem;
        ssl_certificate_key /usr/local/nginx/conf/cert/www.ysccs.tech.key;

        # 静态资源路由
        # 匹配 /smart/edu/static/* 的请求，直接从磁盘读取文件，不经过 Python 后端，避免 uvicorn 处理静态内容的开销。
        # alias 末尾必须有斜杠：请求 /smart/edu/static/chat.js → 读取 /opt/smart_edu/src/backend/web/chat.js
        location /smart/edu/static/ {
            alias /opt/smart_edu/src/backend/web/;
            add_header Cache-Control $static_cache_control; # 由上方 map 根据文件后缀决定
        }

        # 动态资源请求，API 接口反向代理到 FastAPI
        location /smart/edu/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;         # HTTP/1.1（流式响应必需）

            # 流式响应：关闭 Nginx 缓冲，token 实时透传到客户端（SSE / StreamingResponse 必须）
            proxy_buffering    off;
            proxy_cache        off;

            proxy_set_header Connection        "";                      # 清空 Connection 头，避免长连接中断
            proxy_set_header Host              $host;                   # 传递域名
            proxy_set_header X-Real-IP         $remote_addr;            # 传递客户端真实 IP
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # 传递代理链 IP
            proxy_set_header X-Forwarded-Proto $scheme;                 # 传递协议（HTTPS）

            # 超时配置（RAG 链路较慢，给足时间）
            proxy_connect_timeout  60s;   # Nginx → 后端 TCP 握手超时
            proxy_send_timeout    120s;   # Nginx 向后端发送请求数据超时
            proxy_read_timeout    120s;   # 等待后端返回响应超时
        }
    }
}